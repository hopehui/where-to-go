<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Where to eat?</title>
  <style>
    body { font-family: sans-serif; max-width: 520px; margin: 0 auto; padding: 2rem 1rem; }
    textarea { width: 100%; height: 140px; font-size: 14px; padding: 10px; box-sizing: border-box; }
    button { width: 100%; padding: 10px; font-size: 15px; cursor: pointer; margin-top: 12px; }
    #result-box { margin-top: 1.5rem; background: #f5f5f5; border-radius: 8px; padding: 1.25rem; text-align: center; }
    #error-msg { color: red; font-size: 13px; margin-top: 8px; display: none; }
  </style>
</head>
<body>

  <h1 style="font-size: 22px; font-weight: 500;">Random place picker</h1>
  <p style="color: #666; font-size: 14px;">Paste your Google Maps list, get a random place.</p>

  <label style="font-size: 13px;">Paste your places (one per line)</label>
  <textarea id="places-input" placeholder="Dishoom&#10;Padella&#10;St. John"></textarea>

  <button id="pick-btn">Pick a random place</button>
  <div id="error-msg"></div>

  <div id="result-box">
    <p style="font-size: 13px; color: #666; margin: 0 0 4px;">Your random place is</p>
    <p id="result-name" style="font-size: 22px; font-weight: 500; margin: 0;">—</p>
  </div>

  <script>
    document.getElementById('pick-btn').addEventListener('click', function() {
      const input = document.getElementById('places-input').value;
      const errorMsg = document.getElementById('error-msg');
      const resultName = document.getElementById('result-name');

      errorMsg.style.display = 'none';

      const places = input
        .split('\n')
        .map(p => p.trim())
        .filter(p => p.length > 0);

      if (places.length === 0) {
        errorMsg.textContent = 'Paste at least one place first.';
        errorMsg.style.display = 'block';
        return;
      }

      if (places.length === 1) {
        errorMsg.textContent = 'Add more than one place to get a random pick.';
        errorMsg.style.display = 'block';
        return;
      }

      const random = places[Math.floor(Math.random() * places.length)];
      resultName.textContent = random;
    });
  </script>

</body>
</html>
